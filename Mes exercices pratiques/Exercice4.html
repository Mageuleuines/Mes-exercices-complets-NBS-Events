
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode</title>
    <!-- script d'initiation theme localStorage -->
     <script>
        (function() {
            const themeSauvegarde=localStorage.getItem('theme-prefere');
            const prefereNuit=window.matchMedia('(prefers-color-scheme:dark)').matches;
            let themeAAppliquer;
            if(themeSauvegarde) {
                themeAAppliquer=themeSauvegarde;
            }
            else if(prefereNuit) {
                themeAAppliquer='dark';
            }
            else {
                themeAAppliquer='light'
            }

            document.documentElement.setAttribute('data-bs-theme', themeAAppliquer);
        }) ();
     </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Exercice4.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">MonSite</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false"
                aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>
            </button>

                <div class="collapse navbar-collapse" id="navbarContent">

                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                        <li class="nav-item">
                            <a class="nav-link active" href="#">Accueil</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">A propos</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Contact</a>
                        </li>
                    </ul>

                    <button id="themeToggle" class="btn btn-outline-secondary" 
                        onclick="themeToggle()" title="Basculer le thème">
                        Démarrer
                    </button>
                </div>
        </div>

    </nav>

    <main id="main">
        <section id="hero" class="py-5">
            <div class="container text-center">
                <h2>Dark Mode Sombre</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Facilis aliquid veniam hic 
                    libero molestiae temporibus, excepturi cum deserunt quia saepe.</p>

                    <button class="btn btn-primary">Bouton normal</button>
            </div>

        </section>
    </main>

    <script>
        function themeToggle(){

        const htmlElement=document.documentElement;
        const htmlActuel=htmlElement.getAttribute('data-bs-theme');
        const nouveauTheme=htmlActuel === 'dark' ? 'light' : 'dark';
        htmlElement.setAttribute('data-bs-theme', nouveauTheme);
        localStorage.setItem('theme-prefere', nouveauTheme);
        const boutonToggle=document.getElementById('themeToggle');

        if (nouveauTheme==="dark") {
            boutonToggle.textContent='☀️';
            boutonToggle.title='passer en mode clair';
        }
        else{
            boutonToggle.textContent= '🌙';
            boutonToggle.title='passer en mode sombre';
        }
    }
    </script>
    
</body>
</html>
